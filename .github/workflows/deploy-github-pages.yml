# Build with correct asset base (/threejs-engine-dev/) and deploy dist.
# GitHub Pages does not run Vite; linked @base/* packages are built from vue-three-base-packages.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: threejs-engine-dev

      - name: Checkout @base workspace (pnpm link:../SHARED/…)
        uses: actions/checkout@v4
        with:
          repository: komogortev/vue-three-base-packages
          path: SHARED

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: |
            threejs-engine-dev/pnpm-lock.yaml
            SHARED/pnpm-lock.yaml

      - name: Install and build @base packages
        run: pnpm install --frozen-lockfile && pnpm build
        working-directory: SHARED

      - name: Install app
        run: pnpm install --frozen-lockfile
        working-directory: threejs-engine-dev

      - name: Build app
        run: pnpm run build
        working-directory: threejs-engine-dev
        env:
          VITE_BASE_PATH: /threejs-engine-dev/

      # v3 includes dotfiles (e.g. .nojekyll); v4 omits them by default.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: threejs-engine-dev/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
